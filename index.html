<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Details Calculation</title>

<style>
:root{
  --green:#2e7d32;
  --green-dark:#1b5e20;
  --bg:#eef2f7;
  --card:#fff;
  --border:#ccc;
  --soft:#f1f8e9;
}

body{
  font-family: Arial;
  margin:0;
  background:var(--bg);
  padding:8px;
}

.header{
  text-align:center;
}
.header h3{margin:0;font-size:14px;color:var(--green-dark);}
.header h2{margin:3px 0 10px;font-size:18px;}

.container{
  max-width:420px;
  margin:auto;
  background:var(--card);
  padding:14px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

label{
  font-size:13px;
  font-weight:bold;
  display:block;
  margin-top:10px;
}

.req{color:red;}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:4px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:15px;
}

input:disabled{background:#eee;}

button{
  margin-top:14px;
  background:var(--green);
  color:white;
  border:none;
  font-weight:bold;
}

.result{
  display:none;
  margin-top:14px;
  background:var(--soft);
  padding:10px;
  border-radius:8px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
<h3>Horticulture Dept, Pakyong District</h3>
<h2>Crop Details Calculation</h2>
</div>

<div class="container">

<label>Crop <span class="req">*</span></label>
<select id="crop" onchange="updateInputs()">
<option value="">--Select--</option>

<option value="orange">Orange</option>
<option value="kiwi">Kiwi</option>
<option value="banana">Banana</option>
<option value="papaya">Papaya</option>
<option value="avocado">Avocado</option>
<option value="guava">Guava</option>

<option value="urad">Urad Dal</option>
<option value="soyabean">Soyabean</option>
<option value="mustard">Mustard</option>
<option value="rice">Rice</option>
<option value="maize">Maize</option>
<option value="buckwheat">Buckwheat</option>
<option value="millet">Millet</option>

<option value="frenchbean">French Bean</option>
<option value="pea">Pea</option>
<option value="cabbage">Cabbage</option>
<option value="cauliflower">Cauliflower</option>
<option value="broccoli">Broccoli</option>
<option value="carrot">Carrot</option>
<option value="onion">Onion</option>
<option value="garlic">Garlic</option>
<option value="radish">Radish</option>
<option value="palak">Palak</option>
<option value="coriander">Coriander</option>
<option value="tomato">Tomato</option>
<option value="brinjal">Brinjal</option>
<option value="chilly">Chilly</option>
<option value="bottle">Bottle Gourd</option>
<option value="bitter">Bitter Gourd</option>
<option value="bhindi">Bhindi</option>
<option value="chayote">Chayote</option>
<option value="cucumber">Cucumber</option>
<option value="mustardgreen">Mustard Green</option>
<option value="potato">Potato</option>
<option value="pumpkin">Pumpkin</option>
<option value="butter">Butter Beans</option>
<option value="drum">Drum Stick</option>

<option value="cardamom">Large Cardamom</option>
<option value="ginger">Ginger</option>
<option value="turmeric">Turmeric</option>

</select>

<label id="mainLabel">Area (ha) <span class="req">*</span></label>
<input type="number" id="mainInput">

<label id="secondLabel">Planting Material</label>
<input type="number" id="secondInput" disabled>

<label>Planting Material Cost (₹)</label>
<input type="number" id="cost">

<label>Selling Price per kg <span class="req">*</span></label>
<input type="number" id="price">

<label>Labour</label>
<input type="number" id="labour">

<label>Other Cost</label>
<input type="number" id="other">

<button onclick="calculate()">Calculate</button>

<div id="result" class="result"></div>

</div>

<script>

const labourRate=500;

const data={
orange:{unit:"No.",mode:"qty",q:400,y:12000},
kiwi:{unit:"No.",mode:"qty",q:114,y:8000},
banana:{unit:"No.",mode:"qty",q:1100,y:35000},
papaya:{unit:"No.",mode:"qty",q:1800,y:40000},
avocado:{unit:"No.",mode:"qty",q:30,y:6000},
guava:{unit:"No.",mode:"qty",q:270,y:15000},

urad:{unit:"Kg",mode:"area",q:20,y:800},
soyabean:{unit:"Kg",mode:"area",q:70,y:2000},
mustard:{unit:"Kg",mode:"area",q:5,y:1000},
rice:{unit:"Kg",mode:"area",q:30,y:1800},
maize:{unit:"Kg",mode:"area",q:20,y:1800},
buckwheat:{unit:"Kg",mode:"area",q:50,y:1200},
millet:{unit:"Kg",mode:"area",q:10,y:800},

frenchbean:{unit:"gm",mode:"area",q:60000,y:1000},
pea:{unit:"gm",mode:"area",q:80000,y:10000},
cabbage:{unit:"gm",mode:"area",q:575,y:25000},
cauliflower:{unit:"gm",mode:"area",q:575,y:20000},
broccoli:{unit:"gm",mode:"area",q:500,y:10000},
carrot:{unit:"gm",mode:"area",q:5000,y:18000},
onion:{unit:"No.",mode:"qty",q:650000,y:12000},
garlic:{unit:"Kg",mode:"area",q:600,y:7000},
radish:{unit:"gm",mode:"area",q:9000,y:20000},
palak:{unit:"gm",mode:"area",q:28000,y:8000},
coriander:{unit:"gm",mode:"area",q:12000,y:6000},
tomato:{unit:"gm",mode:"area",q:125,y:20000},
brinjal:{unit:"No.",mode:"qty",q:27000,y:18000},
chilly:{unit:"No.",mode:"qty",q:49000,y:8000},
bottle:{unit:"Kg",mode:"area",q:3,y:12000},
bitter:{unit:"Kg",mode:"area",q:4,y:8000},
bhindi:{unit:"No.",mode:"qty",q:74000,y:7000},
chayote:{unit:"No.",mode:"qty",q:1500,y:12000},
cucumber:{unit:"No.",mode:"qty",q:6600,y:10000},
mustardgreen:{unit:"Kg",mode:"area",q:5,y:8000},
potato:{unit:"Kg",mode:"area",q:2000,y:15000},
pumpkin:{unit:"No.",mode:"qty",q:1600,y:12000},
butter:{unit:"gm",mode:"area",q:30000,y:5000},
drum:{unit:"No.",mode:"qty",q:1100,y:8000},

cardamom:{unit:"No.",mode:"qty",q:4500,y:300},
ginger:{unit:"Kg",mode:"area",q:2000,y:12000},
turmeric:{unit:"Kg",mode:"area",q:2200,y:15000},
};

function updateInputs(){
let c=document.getElementById("crop").value;
if(!c)return;
let d=data[c];

if(d.mode==="qty"){
mainLabel.innerHTML="Number ("+d.unit+") <span class='req'>*</span>";
secondLabel.innerText="Area (ha)";
}else{
mainLabel.innerHTML="Area (ha) <span class='req'>*</span>";
secondLabel.innerText="Quantity ("+d.unit+")";
}
}

function calculate(){

let c=document.getElementById("crop").value;
if(!c)return alert("Select crop");

let d=data[c];

let main=document.getElementById("mainInput").value;
let price=document.getElementById("price").value;

if(!main||!price)return alert("Fill required fields");

let cost=document.getElementById("cost").value||0;
let labour=document.getElementById("labour").value||0;
let other=document.getElementById("other").value||0;

let area,qty;

if(d.mode==="qty"){
qty=main;
area=qty/d.q;
secondInput.value=area.toFixed(2);
}else{
area=main;
qty=area*d.q;
secondInput.value=qty.toFixed(2)+" "+d.unit;
}

let yieldVal=area*d.y;
let labourCost=labour*labourRate;
let income=yieldVal*price;
let expenditure=(qty*cost)+labourCost+Number(other);

result.style.display="block";
result.innerHTML=`
<b>Result:</b><br><br>
Quantity: ${qty} ${d.unit}<br>
Area: ${area.toFixed(2)} ha<br>
Yield: ${yieldVal.toFixed(2)} kg<br>
Income: ₹ ${income.toFixed(0)}<br>
Expenditure: ₹ ${expenditure.toFixed(0)}
`;
}

</script>

</body>
</html>
