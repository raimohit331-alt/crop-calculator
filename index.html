<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Details Calculation</title>

<style>
body { font-family: Arial; background:#eef2f7; margin:0; padding:8px; }
.header { text-align:center; }
.container { max-width:420px; margin:auto; background:#fff; padding:15px; border-radius:10px; }

label { font-weight:bold; margin-top:10px; display:block; font-size:13px; }
input,select,button {
  width:100%; padding:10px; margin-top:4px;
  border-radius:6px; border:1px solid #ccc; font-size:15px;
}
input:disabled { background:#eee; }

button { background:#2e7d32; color:white; border:none; margin-top:12px; }

.result { margin-top:12px; padding:10px; background:#f1f8e9; border-radius:8px; display:none; }

.required { color:red; }
</style>
</head>

<body>

<div class="header">
<h3>Horticulture Dept, Pakyong District</h3>
<h2>Crop Details Calculation</h2>
</div>

<div class="container">

<label>Crop</label>
<select id="crop" onchange="updateInputs()">
<option value="">-- Select Crop --</option>
<option value="bhindi">Bhindi</option>
<option value="frenchbean">French Bean</option>
<option value="onion">Onion</option>
<option value="orange">Orange</option>
</select>

<label id="areaLabel">Area (hectare) <span class="required">*</span></label>
<input type="number" id="area">

<label id="materialLabel">Planting Material</label>
<input type="number" id="plants" disabled>

<label id="seedCostLabel">Cost</label>
<input type="number" id="seedCost">

<label>Market Price (₹/kg)</label>
<input type="number" id="price">

<label>Labour No.</label>
<input type="number" id="labour">

<label>Other Cost (₹)</label>
<input type="number" id="otherCost">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

const labourRate = 500;

const masterData = {

bhindi:{mode:"area",unit:"No.",rate:74000,yield:7000},
frenchbean:{mode:"area",unit:"gm",rate:60000,yield:1000},
onion:{mode:"area",unit:"No.",rate:650000,yield:12000},

orange:{mode:"plants",unit:"No.",plantsHa:400,yieldHa:12000}

};

function updateInputs(){

let crop=document.getElementById("crop").value;
let data=masterData[crop];

let plants=document.getElementById("plants");
let materialLabel=document.getElementById("materialLabel");

if(!crop) return;

if(data.mode==="plants"){
plants.disabled=false;
materialLabel.innerText="Number of Plants (No.)";
}
else{
plants.disabled=true;
materialLabel.innerText="Planting Material ("+data.unit+") [Auto]";
}

}

function calculate(){

let crop=document.getElementById("crop").value;
let data=masterData[crop];

let area=parseFloat(document.getElementById("area").value);
let plants=parseFloat(document.getElementById("plants").value)||0;

if(!area && data.mode!=="plants"){
alert("Area is required");
return;
}

let qty=0;
let yield=0;

if(data.mode==="plants"){
if(!plants){
alert("Enter number of plants");
return;
}
qty=plants;
yield=(plants/data.plantsHa)*data.yieldHa;
}
else{
qty=data.rate*area;
yield=data.yield*area;
}

let seedCost=parseFloat(document.getElementById("seedCost").value)||0;
let price=parseFloat(document.getElementById("price").value)||0;
let labour=parseFloat(document.getElementById("labour").value)||0;
let otherCost=parseFloat(document.getElementById("otherCost").value)||0;

let income=yield*price;
let expenditure=(qty*seedCost)+(labour*labourRate)+otherCost;

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`
<b>Result:</b><br><br>
Planting Material: ${qty.toFixed(0)} ${data.unit}<br>
Yield: ${yield.toFixed(0)} kg<br>
Income: ₹ ${income.toFixed(0)}<br>
Expenditure: ₹ ${expenditure.toFixed(0)}
`;

}

</script>

</body>
</html>
