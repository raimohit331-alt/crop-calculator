<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Details Calculation</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  margin: 0;
  padding: 8px;
}

.header {
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  background: #2e7d32;
  color: white;
  border: none;
  margin-top: 12px;
}

.result {
  margin-top: 12px;
  padding: 10px;
  background: #f1f8e9;
  border-radius: 8px;
  display: none;
}
</style>
</head>

<body>

<div class="header">
<h3>Horticulture Dept, Pakyong District</h3>
<h2>Crop Details Calculation</h2>
</div>

<div class="container">

<label>Crop</label>
<select id="crop" onchange="updateInputs()">
<option value="">-- Select Crop --</option>

<option value="urad">Urad Dal</option>
<option value="soyabean">Soyabean</option>
<option value="mustard">Mustard</option>
<option value="rice">Rice</option>
<option value="maize">Maize</option>
<option value="buckwheat">Buckwheat</option>
<option value="millet">Millet</option>

<option value="frenchbean">French Bean</option>
<option value="pea">Pea</option>

<option value="orange">Orange</option>
<option value="kiwi">Kiwi</option>
<option value="banana">Banana</option>
<option value="papaya">Papaya</option>
<option value="avocado">Avocado</option>
<option value="guava">Guava</option>

</select>

<label>Area (hectare)</label>
<input type="number" id="area" step="0.1">

<label id="plantLabel">Number of Plants (for fruits only)</label>
<input type="number" id="plants">

<label>Seed / Plant Cost (₹)</label>
<input type="number" id="seedCost">

<label>Market Price (₹/kg)</label>
<input type="number" id="price">

<label>Labour No.</label>
<input type="number" id="labour">

<label>Other Cost (₹)</label>
<input type="number" id="otherCost">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

const labourRate = 500;

const masterData = {

// FIELD
urad:{type:"field",unit:"kg",rate:20,yield:800,seedCost:150,price:100},
soyabean:{type:"field",rate:70,yield:2000,seedCost:50,price:40},
mustard:{type:"field",rate:5,yield:1000,seedCost:100,price:60},
rice:{type:"field",rate:30,yield:1800,seedCost:0,price:150},
maize:{type:"field",rate:20,yield:1800,seedCost:100,price:60},
buckwheat:{type:"field",rate:50,yield:1200,seedCost:100,price:60},
millet:{type:"field",rate:10,yield:800,seedCost:100,price:80},

// VEGETABLE
frenchbean:{type:"veg",unit:"gm",rate:60000,yield:1000,seedCost:400,price:80},
pea:{type:"veg",unit:"gm",rate:80000,yield:10000,seedCost:400,price:80},

// FRUIT
orange:{type:"fruit",plantsHa:400,yieldHa:12000,seedCost:30,price:100},
kiwi:{type:"fruit",plantsHa:114,yieldHa:8000},
banana:{type:"fruit",plantsHa:1100,yieldHa:35000},
papaya:{type:"fruit",plantsHa:1800,yieldHa:40000},
avocado:{type:"fruit",plantsHa:30,yieldHa:6000},
guava:{type:"fruit",plantsHa:270,yieldHa:15000}

};

function formatCurrency(v){
return "₹ " + v.toLocaleString("en-IN");
}

function updateInputs(){
let crop=document.getElementById("crop").value;
if(!crop) return;

let d=masterData[crop];

document.getElementById("seedCost").value=d.seedCost||"";
document.getElementById("price").value=d.price||"";
}

function calculate(){

let crop=document.getElementById("crop").value;
let area=parseFloat(document.getElementById("area").value)||0;
let plants=parseFloat(document.getElementById("plants").value)||0;

if(!crop){
alert("Select crop");
return;
}

let d=masterData[crop];

let seedQty=0;
let yield=0;

if(d.type==="fruit"){

if(plants>0){
area = plants / d.plantsHa;
}
else if(area>0){
plants = d.plantsHa * area;
}
else{
alert("Enter area or plants");
return;
}

yield = d.yieldHa * area;

seedQty = plants;

}
else{

if(!area){
alert("Enter area");
return;
}

seedQty = d.rate * area;
yield = d.yield * area;

}

let seedCost=parseFloat(document.getElementById("seedCost").value)||0;
let price=parseFloat(document.getElementById("price").value)||0;
let labour=parseFloat(document.getElementById("labour").value)||0;
let otherCost=parseFloat(document.getElementById("otherCost").value)||0;

let seedTotal = seedQty * seedCost;
let labourCost = labour * labourRate;
let income = yield * price;
let expenditure = seedTotal + labourCost + otherCost;

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`
<strong>Result:</strong><br><br>
Area: ${area.toFixed(2)} ha<br>
Plants/Seed: ${seedQty.toFixed(0)}<br>
Yield: ${yield.toFixed(0)} kg<br>
Income: ${formatCurrency(income)}<br>
Expenditure: ${formatCurrency(expenditure)}
`;
}

</script>

</body>
</html>
